<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SOPHON Initializing</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- HTTP-style redirect -->
<meta http-equiv="refresh" content="1.5; url=https://github.com/legionasaurus/SOPHON">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
@font-face {
    font-family: "Carbon";
    src: url("fonts/Carbon.ttf") format("truetype");
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0a0a0a;
    color: #7dc48b;
    font-family: "Inter", sans-serif;
    text-align: center;
    overflow: hidden;
}

.container {
    max-width: 700px;
}

.title {
    font-family: "Carbon", sans-serif;
    font-size: 5.5rem;
    margin: 0;
    letter-spacing: 2px;
    text-shadow: 0 0 18px #7dc48b33;
}

.subtitle {
    font-family: "Rajdhani", sans-serif;
    font-size: 1.4rem;
    color: #a0ff9e;
    margin-top: 0.5rem;
}

.status {
    margin-top: 2rem;
    font-size: 0.95rem;
    color: #c2f0b1;
    opacity: 0.85;
    letter-spacing: 1px;
}

/* Loading bar container */
.bar {
    margin: 1.8rem auto 0;
    width: 260px;
    height: 3px;
    background: #15251a;
    border-radius: 3px;
    overflow: hidden;
    position: relative;
}

/* animated pulse */
.bar::after {
    content: "";
    position: absolute;
    height: 100%;
    width: 40%;
    background: linear-gradient(90deg, transparent, #7dc48b, transparent);
    animation: scan 1.2s infinite ease-in-out;
}

@keyframes scan {
    0% { transform: translateX(-120%); }
    100% { transform: translateX(320%); }
}

/* subtle background glow */
.glow {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(125,196,139,0.08), transparent 60%);
    animation: pulse 3s infinite ease-in-out;
}

@keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.1); opacity: 0.7; }
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="container">
    <div class="title">SOPHON</div>
    <div class="subtitle">Photobioreactor</div>

    <div class="status">Redirecting to repository...</div>

    <div class="bar"></div>
</div>

</body>
</html>
